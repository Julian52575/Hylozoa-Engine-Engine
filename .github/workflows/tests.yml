name: Engine tests

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install Dependencies
        run: |
          ./scripts/install-dependencies.sh
      - name: Build
        run: |
          just build
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-artifact
          path: ./build/

  testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./build/
    
      - name: Run unit test
        if: always()
        run: |
          just test
      - name: Run tidy
        if: always()
        run: |
          just tidy
      - name: Run format check
        if: always()
        run: |
          just format-check
