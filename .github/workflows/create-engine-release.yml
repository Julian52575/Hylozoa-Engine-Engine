name: "Create Engine Release"
on:
  push:
    branches:
      - "main"
      - "cicd-tests"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_NAME: Engine

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [x64, x86]
    env:
      GH_TOKEN: ${{ github.token }}
      tag: ${{ github.ref_name }}
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        ./scripts/install-dependencies.sh

    - name: Install just (Windows)
      if: runner.os == 'Windows'
      uses: taiki-e/install-action@just

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        just

    - name: Restore _deps cache
      id: cache-deps-restore
      uses: actions/cache/restore@v5
      with:
        path: |
          ./build/_deps
        key: ${{ runner.os }}-${{ matrix.arch }}-release-cache-deps

    - name: Build
      shell: bash
      run: just build-release

    - name: Cache _deps
      # Save cache as long as the build is not cancelled
      if: success() || failure()
      id: cache-deps-save
      uses: actions/cache/save@v5
      with:
        path: |
          ./build/_deps
        key: ${{ runner.os }}-${{ matrix.arch }}-release-cache-deps

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hylozoa_engine-${{ matrix.arch }}-${{ matrix.os }}
        path: build/

  expose_version_tag:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.set_version_tag.outputs.version_tag }}
    steps:
      - name: Set
        id: set_version_tag
        run: |
          version_tag=$(date +"%g-%m-%d")
          echo "version_tag=${version_tag}" >> $GITHUB_OUTPUT

  release:
    needs: expose_version_tag
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      DATE: ${{ needs.expose_version_tag.outputs.version_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: |
            hylozoa_engine-x64-ubuntu-latest
            hylozoa_engine-x86-ubuntu-latest
            hylozoa_engine-x64-windows-latest
            hylozoa_engine-x86-windows-latest

      - name: Debug ls
        run: ls

      - name: Create Release
        uses: elgohr/Github-Release-Action@release-20241111151247
        with:
          title: "${{ env.RELEASE_NAME }} - ${{ env.DATE }}"
          tag: "${{ github.ref_name }}-${{ env.DATE }}"
          workdir: .
          assets: |
            hylozoa_engine-x64-ubuntu-latest
            hylozoa_engine-x86-ubuntu-latest
            hylozoa_engine-x64-windows-latest
            hylozoa_engine-x86-windows-latest
